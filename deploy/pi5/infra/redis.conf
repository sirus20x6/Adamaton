# Listen on all interfaces inside the container; Docker network isolates the port.
bind 0.0.0.0

# Disable protected-mode because access is gated at the Docker network level.
protected-mode no

# Hard cap on memory; prevents Redis from consuming the host.
maxmemory 1gb

# Evict least-recently-used keys across the whole keyspace once maxmemory is hit.
maxmemory-policy allkeys-lru

# RDB snapshot triggers: save if at least N keys changed in the given seconds.
save 900 1
save 300 10
save 60 10000

# Append-only log on for crash durability; flushed every second (good balance).
appendonly yes
appendfsync everysec

# Emit keyspace expiration events so the priority gate can react to TTL pops.
notify-keyspace-events Ex
