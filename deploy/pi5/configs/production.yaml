# Logging Configuration
logging:
  level: "info"
  format: "json"

# Advanced Features
features:
  detailed_comments: true           # Generate detailed GitHub comments
  severity_emojis: true            # Use emoji indicators for severity
  confidence_reporting: true       # Include confidence scores in comments
  agent_timing: true               # Log individual agent execution times
  parallel_optimization: true      # Optimize for parallel execution
