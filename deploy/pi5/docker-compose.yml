# deploy/pi5/docker-compose.yml — main Adamaton stack (Raspberry Pi 5, arm64).
#
# Image refs use the workstation's local registry at ${WORKSTATION_IP}:5000
# (default 10.0.4.37:5000). Each service has its own per-image tag env var
# (ADAMATON_<NAME>_TAG) sourced from image-tags.env; the deploy-agent
# rewrites the relevant line on every /deploy/restart call.
#
# Two things must be true at deploy time:
#   1. /etc/docker/daemon.json on this Pi lists 10.0.4.37:5000 as an
#      insecure-registry (HTTP, LAN-only). See docs/PUSH_DEPLOY.md.
#   2. image-tags.env exists (cp image-tags.env.example image-tags.env on
#      first boot; deploy-agent rewrites it on every push thereafter).
#
# Services:
#   - postgres (pgvector/pgvector:pg16) — shared backing store for every schema
#   - redis (7-alpine) — arq queue + cache for the Python backend
#   - searxng — meta-search engine for nano-research stage 2 (web)
#   - temporal (auto-setup:1.27) — workflow engine
#   - postgrest — read-only API exposed at /db/* via Caddy
#   - r2g (Go) — ports the audited /v3 endpoints (documents, chunks, search)
#   - plugin-host (Go) — supervises plugin subprocesses (gRPC over unix socket)
#   - skills-rae + skills-rae-worker (Go) — SkillRAE retrieval + indexer
#   - nano-research + nano-research-worker (Go) — autonomous research pipeline
#   - figure-renderer — matplotlib sidecar invoked by nano-research
#   - reranker — cross-encoder reranker for r2g
#   - evo-api (Go) — dashboard/aggregator API (the /api/v1/* surface)
#   - adamaton-worker — unified Temporal worker (skills/reindex/dispatch/evo queues)
#   - frontend (caddy:2-alpine) — SPA host + reverse proxy (Caddyfile)
#   - deploy-agent (Go) — push-deploy receiver; see platform/deploy-agent

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-pi.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 200mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "8888:8080"
    restart: unless-stopped

  # ---- LDR (Local Deep Research, upstream Python) -------------------------
  # Temporary service deployed for Phase A bring-up of the Go bridge → LDR
  # path. The Go bridge speaks HTTP to this service over the compose network
  # and authenticates via the header-auth middleware (see task A.0) keyed by
  # LDR_API_KEY. Slated for removal in Phase B.9 once the Go reimplementation
  # passes the parity gate. See deploy/pi5/LDR_BRINGUP.md.
  #
  # Upstream image is multi-arch (linux/arm64 included), so it works on the
  # pi5 host without a local build. Switch to `build:` if a local fork is
  # needed for the middleware patch and upstream hasn't accepted it.
  ldr:
    image: localdeepresearch/local-deep-research:latest
    environment:
      # Docker-required network bindings (per upstream docker-compose).
      LDR_WEB_HOST: 0.0.0.0
      LDR_WEB_PORT: "5000"
      LDR_DATA_DIR: /data
      # SearXNG meta-search backend — reuse the existing pi5 service.
      LDR_SEARCH_ENGINE_WEB_SEARXNG_DEFAULT_PARAMS_INSTANCE_URL: http://searxng:8080
      # Adamaton-specific: shared secret consumed by the header-auth
      # middleware patched in task A.0. Upstream LDR does not read this
      # variable; if the middleware is not yet present this is a no-op.
      LDR_API_KEY: ${LDR_API_KEY}
      # LLM provider — point at the workstation's OpenAI-compatible endpoint
      # (vLLM) so LDR uses the same backend as r2g/nano-research instead of
      # spinning up its own ollama. Override at deploy time if needed.
      LDR_LLM_PROVIDER: ${LDR_LLM_PROVIDER:-openai_endpoint}
      LDR_LLM_OPENAI_ENDPOINT_URL: ${LDR_LLM_OPENAI_ENDPOINT_URL:-http://10.0.4.37:9080/v1}
      LDR_LLM_OPENAI_ENDPOINT_API_KEY: ${LDR_LLM_OPENAI_ENDPOINT_API_KEY:-}
      LDR_LLM_MODEL: ${LDR_LLM_MODEL:-qwen3.6-27b-nvfp8}
      # Lock public registration off — the bridge is the only consumer.
      LDR_APP_ALLOW_REGISTRATIONS: "false"
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      searxng:
        condition: service_started
    volumes:
      - ldr_data:/data
      - ldr_scripts:/scripts
    # SQLCipher needs mlock() — match upstream's compose.
    ulimits:
      memlock:
        soft: -1
        hard: -1
    # Internal-only; Caddy reverse-proxies ldr.local → ldr:5000.
    expose:
      - "5000"
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.27
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    expose:
      - "7233"
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: postgrest_anon
      PGRST_DB_POOL: "10"
      PGRST_OPENAPI_MODE: ignore-privileges
      PGRST_SERVER_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  # ---- knowledge sub-repo --------------------------------------------------
  r2g:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-r2g:${ADAMATON_R2G_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      R2G_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      R2G_PORT: "7373"
      R2G_PPROF_PORT: "7374"
      R2G_LOG_FORMAT: json
      # BGE_EMBED_URL points at the native llama-server bge-embed (port
      # 8092). BGE_SIDECAR_URL kept as fallback during migration; will
      # be removed once the Python sidecar's LOAD_EMBED_MODEL flips to
      # false.
      BGE_EMBED_URL: ${BGE_EMBED_URL:-http://10.0.4.37:8092}
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      LATEX2TEXT_BIN: /app/bin/latex2text
      OPENAI_API_BASE: ${OPENAI_API_BASE:-http://10.0.4.37:9080/v1}
      R2G_LLM_MODEL: ${R2G_LLM_MODEL:-qwen3.6-27b-nvfp8}
      R2G_DEFAULT_OWNER_ID: ${R2G_DEFAULT_OWNER_ID:-2acb499e-8428-543b-bd85-0d9098718220}
      R2G_RERANKER_URL: http://reranker:8091
      # Document blobs now live in the Garage `dr-uploads` bucket (key scheme
      # uploads/<uuid>), replacing the old dr_uploads volume mount. r2g
      # fail-softs to 503 on upload/ingest if BLOBSTORE_ENDPOINT is unset.
      BLOBSTORE_ENDPOINT: ${BLOBSTORE_ENDPOINT:-http://garage:3900}
      BLOBSTORE_REGION: ${BLOBSTORE_REGION:-us-east-1}
      BLOBSTORE_ACCESS_KEY: ${BLOBSTORE_ACCESS_KEY:-}
      BLOBSTORE_SECRET_KEY: ${BLOBSTORE_SECRET_KEY:-}
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_healthy
    ports:
      - "7373:7373"
      - "7374:7374"
    restart: unless-stopped

  skills-rae:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-skills-rae:${ADAMATON_SKILLS_RAE_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      SKILLS_RAE_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      SKILLS_RAE_PORT: "7376"
      SKILLS_RAE_PPROF_PORT: "7377"
      SKILLS_RAE_LOG_FORMAT: json
      # BGE_EMBED_URL points at the native llama-server bge-embed.
      # BGE_SIDECAR_URL kept as fallback until LOAD_EMBED_MODEL flips.
      BGE_EMBED_URL: ${BGE_EMBED_URL:-http://10.0.4.37:8092}
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      SKILLS_RAE_EMBED_MODEL: bge-m3
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "7376"
    ports:
      - "7376:7376"
    # debian-slim image has no curl/wget; speak minimal HTTP over
    # bash /dev/tcp to the /healthz route (db-ping-backed).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/7376; printf 'GET /healthz HTTP/1.0\r\n\r\n' >&3; head -1 <&3 | grep -q 200"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  skills-rae-worker:
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-skills-rae-worker:${ADAMATON_SKILLS_RAE_WORKER_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      SKILLS_RAE_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      # BGE_EMBED_URL points at the native llama-server bge-embed.
      # BGE_SIDECAR_URL kept as fallback until LOAD_EMBED_MODEL flips.
      BGE_EMBED_URL: ${BGE_EMBED_URL:-http://10.0.4.37:8092}
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      SKILLS_RAE_EMBED_MODEL: bge-m3
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      SKILLS_RAE_LOG_LEVEL: info
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

  # Unified Temporal worker. One container, one image, N processes —
  # s6-overlay supervises one adamaton-worker --queue=<q> per entry in
  # WORKER_QUEUES. Pi5 hosts every queue today, so it pulls the 'full'
  # variant (compiled with skills + reindex + dispatch + evo). A leaner
  # 'light' variant exists for nodes that don't need evo.
  #
  # Replaces the four previous worker service blocks:
  #   skills-worker, reindex-worker, dispatch-worker, evo-worker.
  # The image-tags.env entry ADAMATON_WORKER_TAG pins variant+sha
  # together (e.g. "full-sha-abc123"); the four legacy ADAMATON_*_TAG
  # vars are kept in image-tags.env for one release cycle so
  # `bin/adam deploy --rollback` can still spawn the standalone
  # workers from a previous umbrella state.
  adamaton-worker:
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-worker-full:${ADAMATON_WORKER_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      WORKER_QUEUES: skills,reindex-ingest,reindex-extract,dispatch,evo
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      # Skills + dispatch + evo land on the evo Postgres (5432).
      EVO_POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      # Reindex points at deepresearch (5433/deepresearch on pi5; the
      # container reaches it via the compose-internal postgres name on
      # port 5432 because pi5 runs both DBs in one postgres instance —
      # the reindex worker's DSN expects 5433 only on hosts where the
      # deepresearch DB lives elsewhere).
      REINDEX_POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      # Embedding sidecar for the reindex-ingest ChunkEmbedPersist activity
      # (embedding now runs on the worker node, not inside r2g). Prefer the
      # native llama-server bge-embed (8092); BGE_SIDECAR_URL is the legacy
      # Python-sidecar fallback during migration. Must match the model/dim
      # r2g + skills-rae use or pgvector cosine breaks.
      BGE_EMBED_URL: ${BGE_EMBED_URL:-http://10.0.4.37:8092}
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      REINDEX_EMBED_MODEL: bge-m3
      SKILLS_R2R_BASE_URL: http://backend:7272
      SKILLS_R2R_ENABLED: "true"
      PLATFORM_BASE_URL: http://backend:7272
      R2G_URL: http://r2g:7373
      DEEPRESEARCH_URL: http://backend:7272
      # Pi only registers KernelEvaluatorActivities; the workflow
      # dispatches kernel evals to blackwell's "evo-kernel" queue.
      EVO_KERNEL_REMOTE_HOST: ""
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

  reranker:
    # Python sidecar — image still built by the legacy platform/reranker
    # context. Keeping the old name until cross-compile pipeline ships
    # an adamaton-reranker variant.
    image: evo-reranker:dev
    environment:
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
      LOG_LEVEL: INFO
    expose:
      - "8091"
    volumes:
      - reranker_hf_cache:/models
    restart: unless-stopped

  # ---- deepresearch sub-repo ----------------------------------------------
  nano-research:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-nano-research:${ADAMATON_NANO_RESEARCH_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      NANO_RESEARCH_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      NANO_RESEARCH_PORT: "7378"
      NANO_RESEARCH_WORKSPACE: /var/lib/nano-research
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      NANO_RESEARCH_LOG_LEVEL: ${NANO_RESEARCH_LOG_LEVEL:-info}
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - nano_workspace:/var/lib/nano-research
    expose:
      - "7378"
    # Alpine image: busybox wget probes /healthz.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7378/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nano-research-worker:
    # Shares the adamaton-nano-research image with the nano-research service
    # above; entrypoint differs. The tag var stays in sync because both
    # reference ADAMATON_NANO_RESEARCH_TAG.
    # hostname: pi — REQUIRED, like every other pi5 worker. core/workerregistry
    # uses os.Hostname() as the rack-identity suffix; without this the worker
    # registers as nano-research-worker@<container-id>, which the Nodes page
    # classifies as a separate (arm64/4GB) Raspberry Pi rack — a phantom node.
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-nano-research:${ADAMATON_NANO_RESEARCH_TAG:-main}
    env_file: [.env, image-tags.env]
    entrypoint: ["/usr/local/bin/nano-research-worker"]
    environment:
      NANO_RESEARCH_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      QWEN_BASE_URL: ${QWEN_BASE_URL:-http://10.0.4.37:9080/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen3.6-27b-nvfp8}
      QWEN_MODEL_ID: ${QWEN_MODEL_ID:-qwen3.6-27b-nvfp8}
      SKILLS_RAE_URL: http://skills-rae:7376
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      NANO_RESEARCH_LOG_LEVEL: ${NANO_RESEARCH_LOG_LEVEL:-info}
      FIGURE_RENDERER_URL: http://figure-renderer:8090
      NANO_WORKER_LABEL: pi5
      # R2G_URL composes TGS-RAG Channels 1↔2: when set, searchcore
      # strategies (IterativeRefinement, IterDrag) call r2g alongside
      # searxng, so Channel 1's vote-aware retrieval and Channel 2's
      # orphan bridging share the same hit stream. Comment out for
      # web-only behaviour (no Channel 1 contribution).
      R2G_URL: http://r2g:7373
      # LDR_BASE_URL + LDR_API_KEY power the Phase A DEEP_SEARCH bridge
      # (ldrdeepsearch.go). Required when ResearchInput.UseDeepSearch=true.
      # Channel 2 / searchcore strategies don't use these — they only
      # matter for the LDR-Python path that's transient until B.9 parity.
      LDR_BASE_URL: http://ldr:5000
      LDR_API_KEY: ${LDR_API_KEY}
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - nano_workspace:/var/lib/nano-research
    # The Dockerfile's HEALTHCHECK probes http://localhost:7378/healthz,
    # which is the nano-research HTTP server entrypoint. The worker
    # variant has no HTTP listener — Temporal sees liveness via the
    # worker's polling heartbeat, not an HTTP endpoint. Disable so the
    # container doesn't perpetually report `(unhealthy)`.
    healthcheck:
      disable: true
    restart: unless-stopped

  figure-renderer:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-nano-figure-renderer:${ADAMATON_FIGURE_RENDERER_TAG:-main}
    env_file: [.env, image-tags.env]
    expose:
      - "8090"
    restart: unless-stopped

  # ---- platform sub-repo --------------------------------------------------
  # NOTE: services `backend` (Python R2R) + `worker-lo` (its arq sidecar) were
  # removed on 2026-05-18 — `platform/backend/` is retired per docs/WHERE_DID_IT_GO.md
  # ("functionality long since reimplemented in r2g + plugin-host") and the
  # adamaton-platform-backend image was no longer built. Worker-side env vars
  # still pointing at `http://backend:7272` (SKILLS_R2R_BASE_URL,
  # PLATFORM_BASE_URL, the adamaton-worker DEEPRESEARCH_URL) are dead
  # references; cleaning those up belongs with the worker-consolidation
  # follow-up, not this change.

  plugin-host:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-plugin-host:${ADAMATON_PLUGIN_HOST_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      PH_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      PH_PORT: "7375"
      PH_MANIFEST_DIR: /etc/deepresearch/plugins
      PH_SOCKET_DIR: /run/dr-plugins
      # Ephemeral container-local staging (writable layer, not the old
      # dr_uploads volume). Plugins pull their inputs from Garage via the
      # BLOBSTORE_* config and stage them here transiently.
      PH_STAGE_DIR: /run/ph-stage
      BLOBSTORE_ENDPOINT: ${BLOBSTORE_ENDPOINT:-http://garage:3900}
      BLOBSTORE_REGION: ${BLOBSTORE_REGION:-us-east-1}
      BLOBSTORE_ACCESS_KEY: ${BLOBSTORE_ACCESS_KEY:-}
      BLOBSTORE_SECRET_KEY: ${BLOBSTORE_SECRET_KEY:-}
      PH_LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_healthy
    expose:
      - "7375"
    volumes:
      - ./plugin-manifests:/etc/deepresearch/plugins:ro
      # Python plugin payloads (search/zotero/etc.) — bind-mounted into
      # the path plugin-host reads via PH_PLUGIN_PAYLOADS_DIR (default
      # /opt/dr-plugins). Operator drops a symlink at
      # ~/Adamaton-deploy/platform-plugins pointing at the source dir,
      # so plugin code can be swapped without rebuilding the image.
      - ./platform-plugins:/opt/dr-plugins:ro
    # gRPC on 7375 — a TCP connect is the readiness signal. The
    # debian-slim image has no curl/wget; bash /dev/tcp avoids
    # adding one (CMD-SHELL would run dash, which lacks /dev/tcp).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/7375"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # dispatch-worker rolled into adamaton-worker above (queue=dispatch).
  # Block removed; the queue is hosted by the unified worker container.

  evo-api:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-evo-api:${ADAMATON_EVO_API_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      GITEA_BASE_URL: ${GITEA_BASE_URL:-http://localhost}
      TEMPORAL_ADDRESS: temporal:7233
      API_BIND_ADDRESS: 0.0.0.0
      API_TOKEN: ${EVO_API_TOKEN}
      PORT: "9123"
      # Probed by /api/v1/system/status:checkDeepResearch. Points at r2g
      # (the Go replacement for the retired Python R2R backend per
      # docs/WHERE_DID_IT_GO.md). Path is /health (set in apiserver code).
      DEEPRESEARCH_URL: http://r2g:7373
      CCSAVER_DB: /data/ccsaver/data.db
      DASHBOARD_BASE_PATH: /evo-api
      # Workflow-node catalog is baked into the image at
      # /opt/evo/plugins/{builtin,community,n8n}. EVO_HOME makes the
      # apiserver's resolvePluginDirs() pick that canonical layout
      # directly. Operators wanting a host-mounted override can still
      # set EVO_PLUGIN_DIRS (colon-separated) here.
      EVO_HOME: /opt/evo
      # Per-host deploy-agent base URLs. Consumed by the /api/v1/nodes
      # endpoints to proxy "spin up another worker" requests from the
      # SPA to the right rack's agent. The dashboard injects
      # DEPLOY_AGENT_TOKEN server-side, so the SPA never sees it.
      # Compose-internal name for pi5 (same network); LAN-routable
      # addresses for the others.
      # IP-based (not mDNS) because the dashboard runs in the docker
      # network where Pi-internal .local names don't resolve. Override
      # in .env if the LAN topology shifts. pi5 reaches its own agent
      # via the compose service name.
      ADAMATON_DEPLOY_AGENTS: ${ADAMATON_DEPLOY_AGENTS:-pi5=http://deploy-agent:9128,pi5-speaker=http://10.0.4.20:9128,workstation=http://10.0.4.37:9128,blackwell=http://10.0.4.37:9128}
      DEPLOY_AGENT_TOKEN: ${DEPLOY_AGENT_TOKEN}
      # Fleet-health topology — apiserver loads at boot. Env override
      # so operators can repoint without rebuilding the image.
      HEALTH_TOPOLOGY_PATH: /etc/adamaton/health-topology.yml
      # HEALTH_LOCAL_HOST tells the aggregator which host it's running
      # on, used to decide which instances to actively probe vs which
      # to trust the peer deploy-agent's docker compose ps view of.
      HEALTH_LOCAL_HOST: pi5
      # Persistent-terminal backend for the Projects feature. tmux keeps
      # sessions alive across reload/restart; set to "none" to disable the
      # terminal endpoints entirely. The evo-api image ships tmux + bash.
      PTY_BACKEND: ${PTY_BACKEND:-tmux}
    volumes:
      - /srv/ccsaver:/data/ccsaver:ro
      - ./health-topology.yml:/etc/adamaton/health-topology.yml:ro
      # Projects feature: registered project folders are stored as absolute
      # host paths; the terminal feature runs `tmux -c <path>` and the
      # file-tree reads from them, so they must be visible in the container
      # at the SAME path. Point ADAM_PROJECTS_ROOT at the directory your
      # registered repos live under. Defaults to a placeholder so the mount
      # is harmless until an operator sets it (same path in and out).
      - ${ADAM_PROJECTS_ROOT:-/srv/adam-projects}:${ADAM_PROJECTS_ROOT:-/srv/adam-projects}:rw
      - ${AGENT_MEMORY_DIR:-/home/sirus/agent-memory}/claude/CLAUDE.md:/root/.claude/CLAUDE.md:ro
      - ${AGENT_MEMORY_DIR:-/home/sirus/agent-memory}/claude/projects:/root/.claude/projects:ro
      - ${AGENT_MEMORY_DIR:-/home/sirus/agent-memory}/codex/memories:/root/.codex/memories:ro
      - ${AGENT_MEMORY_DIR:-/home/sirus/agent-memory}/gemini/GEMINI.md:/root/.gemini/GEMINI.md:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    expose:
      - "9123"
    # Alpine image: busybox wget probes the unauthenticated /livez.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9123/livez"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---- evolve sub-repo (rolled into adamaton-worker above as queue=evo) ----
  # The standalone evo-worker block moved into the unified adamaton-worker
  # service. KernelBench evals still dispatch to blackwell's "evo-kernel"
  # queue (see deploy/blackwell/docker-compose.yml).

  # ---- Garage: the storage node ------------------------------------------
  # S3-compatible object store; the single thing every blob consumer talks
  # to. Holds dataset artifacts (bucket `datasets`, dataset-worker) AND
  # document blobs (bucket `dr-uploads`, r2g + plugin-host via
  # core/blobstore). This replaced MinIO on 2026-05-24 and is what let us
  # delete the NFS mounts — see deploy/pi5/GARAGE_MIGRATION.md for the
  # one-time bootstrap (layout assign/apply, bucket create, key gen) and
  # the MinIO→Garage data copy.
  #
  # Unlike MinIO, Garage has no static root credentials: after first boot
  # you assign a layout and `garage key create` a least-privilege key, then
  # put its ID/secret into .env as BLOBSTORE_ACCESS_KEY/BLOBSTORE_SECRET_KEY.
  # rpc/admin secrets come from GARAGE_* env (the config file carries none).
  garage:
    image: dxflrs/garage:v1.0.1
    env_file: [.env]
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?set GARAGE_RPC_SECRET in .env (openssl rand -hex 32)}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN:-}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    expose:
      - "3900"
    ports:
      # Published so the operator can run the MinIO→Garage data copy and the
      # bootstrap CLI from the host. Safe to drop to bare `expose` once the
      # migration is done.
      - "3900:3900"
      - "3903:3903"
    healthcheck:
      # The dxflrs/garage image is distroless — no shell, no wget/curl — so the
      # healthcheck must be exec-form and use the only binary present, /garage.
      # `garage status` connects over RPC and exits 0 once the node is up; it is
      # the liveness signal `dataset-worker`'s depends_on gates on. (The :3903
      # /health endpoint would be a richer "layout applied" check but there is
      # no in-image HTTP client to call it with.)
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  dataset-worker:
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-dataset-worker:${ADAMATON_DATASET_WORKER_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      EVO_POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      DATASET_TASK_QUEUE: dataset-mgr
      # Repointed from http://minio:9000 to Garage. dataset-manager's S3
      # client is plain path-style S3, so no code change was needed.
      DATASET_S3_ENDPOINT: http://garage:3900
      DATASET_S3_BUCKET: datasets
      DATASET_S3_REGION: us-east-1
      # The Garage-generated least-privilege key (see GARAGE_MIGRATION.md).
      # Shared with r2g/plugin-host under the BLOBSTORE_* names; the
      # DATASET_S3_* aliases default to them so one key configures all
      # blob consumers. credentialstore lookup (DATASET_S3_ACCESS_NAME /
      # DATASET_S3_SECRET_NAME) still wins over env when present.
      DATASET_S3_ACCESS_KEY: ${DATASET_S3_ACCESS_KEY:-${BLOBSTORE_ACCESS_KEY:-}}
      DATASET_S3_SECRET_KEY: ${DATASET_S3_SECRET_KEY:-${BLOBSTORE_SECRET_KEY:-}}
      # HF token is optional — empty is fine for public datasets.
      HF_TOKEN: ${HF_TOKEN:-}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      garage:
        condition: service_healthy
    restart: unless-stopped

  # ---- v1.0 / v1.1 on-chain observability daemons -------------------------
  # audit-monitor indexes the Adamaton v1.0 Audit contract on Sepolia
  # mainnet-shadow (chain 11155111). Live WS subscription to OutcomePosted,
  # OutcomeChallenged, OutcomeFinalizedChallenged. Exposes /health,
  # /outcomes, /metrics on :9275. The frontend Network section talks to
  # this through Caddy's /network-api/audit/* proxy block.
  #
  # Sepolia RPC notes:
  #   - publicnode WS exits handle eth_subscribe; HTTP-only RPCs return
  #     "notifications not supported" from the abigen Watch* helpers.
  #   - --from-block is set to roughly the deploy window so the daemon's
  #     in-memory snapshot rebuilds on every restart. Bump the value
  #     when the contract is re-deployed.
  audit-monitor:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-audit-monitor:${ADAMATON_AUDIT_MONITOR_TAG:-main}
    env_file: [.env, image-tags.env]
    command:
      # publicnode's public RPC enforces a strict 50k-block-range cap on
      # eth_getLogs / eth_newFilter; abigen's Watch* helpers do a
      # bounded initial filter at subscribe time that often blows
      # through it. Tenderly's public gateway is less strict and
      # speaks WS; swap back to a paid endpoint if rate limits bite.
      - --rpc=wss://sepolia.gateway.tenderly.co
      - --chain-id=11155111
      - --audit-address=0xf3922cf86227301ac9a6b856fe6b577a09f96670
      - --http-addr=0.0.0.0:9275
      # publicnode's public eth_getLogs has a 50k-block-range limit;
      # set --from-block close to the current Sepolia head so backfill
      # stays inside one window. We never expect outcomes posted to a
      # contract before its own deploy block anyway. v1.2 follow-up:
      # chunked backfill inside audit-monitor itself so this number
      # can move freely without operator tuning.
      - --from-block=10825000
      - --health-poll-interval=30s
    restart: unless-stopped
    # No port mapping to the host — Caddy reaches it as
    # http://audit-monitor:9275 over the compose default network.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9275/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # federation-monitor indexes the Adamaton v1.0 Federation contract on
  # Sepolia (chain 11155111). Serves /network-api/federation/* via Caddy.
  # Same WS RPC + tight --from-block window as audit-monitor.
  federation-monitor:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-federation-monitor:${ADAMATON_FEDERATION_MONITOR_TAG:-main}
    env_file: [.env, image-tags.env]
    command:
      - --rpc=wss://sepolia.gateway.tenderly.co
      - --chain-id=11155111
      - --federation-address=0xe9b840d0454161742eb65b295af4d0aa3723026e
      - --http-addr=0.0.0.0:9276
      - --from-block=10825000
      - --health-poll-interval=30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9276/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ledger-monitor indexes the Adamaton v1.0 Ledger contract on Sepolia.
  # Serves /network-api/ledger/* via Caddy.
  ledger-monitor:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-ledger-monitor:${ADAMATON_LEDGER_MONITOR_TAG:-main}
    env_file: [.env, image-tags.env]
    command:
      - --rpc=wss://sepolia.gateway.tenderly.co
      - --chain-id=11155111
      - --ledger-address=0x6dced8becbc68b2454ba03756078f0242578737d
      - --http-addr=0.0.0.0:9277
      - --from-block=10825000
      - --health-poll-interval=30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9277/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # stealthmonitor indexes the Phase 8.2 StealthAnnouncer contract on
  # Sepolia (chain 11155111). Stateless contract; we just observe
  # Announce events and serve them at /network-api/stealth/* via Caddy.
  # Workers pipe /announcements → adamaton-wallet stealth scan with
  # their viewing key to detect incoming stealth payments.
  stealthmonitor:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-stealthmonitor:${ADAMATON_STEALTHMONITOR_TAG:-main}
    env_file: [.env, image-tags.env]
    command:
      - --rpc=wss://sepolia.gateway.tenderly.co
      - --chain-id=11155111
      - --announcer-address=0x21948CE4758f7641f56a8C57f57fe0532011a1A2
      - --http-addr=0.0.0.0:9279
      - --from-block=10875193
      - --health-poll-interval=30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9279/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # finalize-bot is the v1.1 permissionless finalize daemon — subscribes
  # to Audit.OutcomePosted, waits for the dispute window, then signs
  # finalize(jobID) transactions. The only signer-bearing daemon in
  # this compose file.
  #
  # Key handling: the operator places a 0x-prefixed raw hex private
  # key at ./secrets/finalize-bot.key on the host (600 perms, never
  # committed). The compose stanza bind-mounts it into the container
  # read-only at /run/secrets/finalize-bot.key; --key-file points the
  # daemon at that path. Key never appears in env, image, or git.
  #
  # Idempotency: the daemon discovers pending outcomes from its
  # FilterLogs backfill at --from-block; restarting it doesn't
  # re-submit already-finalized outcomes (the contract reverts on
  # double finalize, which the daemon already gracefully handles).
  finalize-bot:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-finalize-bot:${ADAMATON_FINALIZE_BOT_TAG:-main}
    env_file: [.env, image-tags.env]
    command:
      - --rpc=wss://sepolia.gateway.tenderly.co
      - --chain-id=11155111
      - --audit-address=0xf3922cf86227301ac9a6b856fe6b577a09f96670
      - --ledger-address=0x6dced8becbc68b2454ba03756078f0242578737d
      - --federation-address=0xe9b840d0454161742eb65b295af4d0aa3723026e
      - --registry-address=0xfa24dba9dbfe703133388e81af92b694b71e2d16
      - --http-addr=0.0.0.0:9278
      - --from-block=10825000
      - --tick-interval=60s
      - --health-poll-interval=30s
      - --key-file=/run/secrets/finalize-bot.key
    volumes:
      - ./secrets/finalize-bot.key:/run/secrets/finalize-bot.key:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9278/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- frontend sub-repo + edge proxy -------------------------------------
  frontend:
    # Caddy reverse-proxies every API and serves the SPA. The frontend SPA
    # bundle is built on the workstation and rsynced to ./frontend-dist/
    # by up.sh; we bind-mount it read-only into the caddy container.
    image: caddy:2-alpine
    # env_file is required so the Caddyfile's {env.EVO_API_TOKEN}
    # placeholder substitutes correctly at boot. Without it the SPA hits
    # /evo-api/* with an empty Bearer header and evo-api 401s every
    # request ("5 data sources unreachable" UI symptom).
    env_file: [.env]
    volumes:
      - ./frontend-dist:/srv/frontend:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - evo-api
      - ldr
      - nano-research
      - r2g
      - skills-rae
      - plugin-host
      - deploy-agent
    restart: unless-stopped

  # ---- push-deploy receiver -----------------------------------------------
  deploy-agent:
    # Bumped via `bin/adam ship-self pi5` (ssh-based; the agent can't
    # restart itself without cutting the connection). All other services
    # bump via `bin/adam ship pi5 <service>` which talks to this agent.
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-deploy-agent:${ADAMATON_DEPLOY_AGENT_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      DEPLOY_AGENT_HOST: pi5
      # MUST equal the host-side path. The agent shells out to docker
      # compose against the host docker daemon; relative paths in the
      # compose file (./postgres-pi.conf etc.) get resolved against
      # this cwd and then sent to the daemon as bind-mount sources.
      # If this is a container-only path like /workdir the daemon
      # creates empty ghost dirs on the host and bind-mounts those.
      DEPLOY_AGENT_COMPOSE_DIR: /home/sirus/Adamaton-deploy
      DEPLOY_AGENT_BIND: ":9128"
    working_dir: /home/sirus/Adamaton-deploy
    volumes:
      # Docker socket: agent shells out to `docker compose` against the
      # host daemon. Root-equivalent; bearer token is the boundary.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind-mount the deploy dir at the SAME path on both sides so
      # compose's relative-path resolution gives identical results
      # whether evaluated from the agent's view or the host daemon's.
      - /home/sirus/Adamaton-deploy:/home/sirus/Adamaton-deploy
    ports:
      # LAN-direct. bin/adam ship uses http://<host>:9128 instead of going
      # through Caddy/HTTPS -- pi5-speaker has no Caddy edge, and the
      # bearer token is the security boundary anyway. Firewall the
      # 10.0.4.x subnet at the gateway, not here.
      - "9128:9128"
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  # Garage storage node: metadata (sqlite) + object data, separate volumes
  # so the data store can be sized/backed independently. minio_data was
  # removed when MinIO was retired (2026-05-24); its `datasets` contents
  # were copied into Garage per GARAGE_MIGRATION.md before deletion.
  garage_meta:
  garage_data:
  # dr_uploads is the legacy document-staging volume. As of the Garage
  # cutover (2026-05-24) NOTHING mounts it: r2g + plugin-host now read/write
  # document blobs from Garage's dr-uploads bucket via BLOBSTORE_*. Its ~762
  # MiB of persistent data (cag/, plugins/, wiki-seed/, zotero-sqlite/) was
  # archived into Garage under matching prefixes (parity verified). The
  # declaration is kept ONLY so the bytes survive as a rollback net; drop it
  # with `docker volume rm deepresearch_dr_uploads` once the cutover is
  # confirmed end-to-end.
  dr_uploads:
  reranker_hf_cache:
  caddy_data:
  caddy_config:
  nano_workspace:
  ldr_data:
  ldr_scripts:
