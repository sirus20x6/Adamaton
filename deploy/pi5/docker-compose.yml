# deploy/pi5/docker-compose.yml — main Adamaton stack (Raspberry Pi 5, arm64).
#
# Image refs use the workstation's local registry at ${WORKSTATION_IP}:5000
# (default 10.0.4.37:5000). Each service has its own per-image tag env var
# (ADAMATON_<NAME>_TAG) sourced from image-tags.env; the deploy-agent
# rewrites the relevant line on every /deploy/restart call.
#
# Two things must be true at deploy time:
#   1. /etc/docker/daemon.json on this Pi lists 10.0.4.37:5000 as an
#      insecure-registry (HTTP, LAN-only). See docs/PUSH_DEPLOY.md.
#   2. image-tags.env exists (cp image-tags.env.example image-tags.env on
#      first boot; deploy-agent rewrites it on every push thereafter).
#
# Services:
#   - postgres (pgvector/pgvector:pg16) — shared backing store for every schema
#   - redis (7-alpine) — arq queue + cache for the Python backend
#   - searxng — meta-search engine for nano-research stage 2 (web)
#   - temporal (auto-setup:1.27) — workflow engine
#   - postgrest — read-only API exposed at /db/* via Caddy
#   - r2g (Go) — ports the audited /v3 endpoints (documents, chunks, search)
#   - plugin-host (Go) — supervises plugin subprocesses (gRPC over unix socket)
#   - skills-rae + skills-rae-worker (Go) — SkillRAE retrieval + indexer
#   - nano-research + nano-research-worker (Go) — autonomous research pipeline
#   - figure-renderer — matplotlib sidecar invoked by nano-research
#   - reranker — cross-encoder reranker for r2g
#   - backend (Python) — R2R-based platform backend (graphrag, deep ingest)
#   - worker-lo (Python) — graphrag + heavy arq jobs
#   - evo-api (Go) — dashboard/aggregator API (the /api/v1/* surface)
#   - skills-worker, reindex-worker, dispatch-worker, evo-worker — Temporal workers
#   - frontend (caddy:2-alpine) — SPA host + reverse proxy (Caddyfile)
#   - deploy-agent (Go) — push-deploy receiver; see platform/deploy-agent

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-pi.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 200mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "8888:8080"
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.27
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    expose:
      - "7233"
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: postgrest_anon
      PGRST_DB_POOL: "10"
      PGRST_OPENAPI_MODE: ignore-privileges
      PGRST_SERVER_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  # ---- knowledge sub-repo --------------------------------------------------
  r2g:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-r2g:${ADAMATON_R2G_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      R2G_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      R2G_PORT: "7373"
      R2G_PPROF_PORT: "7374"
      R2G_LOG_FORMAT: json
      # BGE_EMBED_URL points at the native llama-server bge-embed (port
      # 8092). BGE_SIDECAR_URL kept as fallback during migration; will
      # be removed once the Python sidecar's LOAD_EMBED_MODEL flips to
      # false.
      BGE_EMBED_URL: ${BGE_EMBED_URL:-http://10.0.4.37:8092}
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      LATEX2TEXT_BIN: /app/bin/latex2text
      OPENAI_API_BASE: ${OPENAI_API_BASE:-http://10.0.4.37:9080/v1}
      R2G_LLM_MODEL: ${R2G_LLM_MODEL:-qwen3.6-27b-nvfp8}
      R2G_DEFAULT_OWNER_ID: ${R2G_DEFAULT_OWNER_ID:-2acb499e-8428-543b-bd85-0d9098718220}
      R2G_RERANKER_URL: http://reranker:8091
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7373:7373"
      - "7374:7374"
    volumes:
      - dr_uploads:/var/lib/dr-uploads:rw
    restart: unless-stopped

  skills-rae:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-skills-rae:${ADAMATON_SKILLS_RAE_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      SKILLS_RAE_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      SKILLS_RAE_PORT: "7376"
      SKILLS_RAE_PPROF_PORT: "7377"
      SKILLS_RAE_LOG_FORMAT: json
      # BGE_EMBED_URL points at the native llama-server bge-embed.
      # BGE_SIDECAR_URL kept as fallback until LOAD_EMBED_MODEL flips.
      BGE_EMBED_URL: ${BGE_EMBED_URL:-http://10.0.4.37:8092}
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      SKILLS_RAE_EMBED_MODEL: bge-m3
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "7376"
    ports:
      - "7376:7376"
    restart: unless-stopped

  skills-rae-worker:
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-skills-rae-worker:${ADAMATON_SKILLS_RAE_WORKER_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      SKILLS_RAE_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      # BGE_EMBED_URL points at the native llama-server bge-embed.
      # BGE_SIDECAR_URL kept as fallback until LOAD_EMBED_MODEL flips.
      BGE_EMBED_URL: ${BGE_EMBED_URL:-http://10.0.4.37:8092}
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      SKILLS_RAE_EMBED_MODEL: bge-m3
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      SKILLS_RAE_LOG_LEVEL: info
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

  skills-worker:
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-skills-worker:${ADAMATON_SKILLS_WORKER_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      EVO_POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      SKILLS_R2R_BASE_URL: http://backend:7272
      SKILLS_R2R_ENABLED: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped

  reindex-worker:
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-reindex-worker:${ADAMATON_REINDEX_WORKER_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      REINDEX_POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      PLATFORM_BASE_URL: http://backend:7272
      LOG_LEVEL: info
      R2G_URL: http://r2g:7373
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped

  reranker:
    # Python sidecar — image still built by the legacy platform/reranker
    # context. Keeping the old name until cross-compile pipeline ships
    # an adamaton-reranker variant.
    image: evo-reranker:dev
    environment:
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
      LOG_LEVEL: INFO
    expose:
      - "8091"
    volumes:
      - reranker_hf_cache:/models
    restart: unless-stopped

  # ---- deepresearch sub-repo ----------------------------------------------
  nano-research:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-nano-research:${ADAMATON_NANO_RESEARCH_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      NANO_RESEARCH_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      NANO_RESEARCH_PORT: "7378"
      NANO_RESEARCH_WORKSPACE: /var/lib/nano-research
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      NANO_RESEARCH_LOG_LEVEL: ${NANO_RESEARCH_LOG_LEVEL:-info}
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - nano_workspace:/var/lib/nano-research
    expose:
      - "7378"
    restart: unless-stopped

  nano-research-worker:
    # Shares the adamaton-nano-research image with the nano-research service
    # above; entrypoint differs. The tag var stays in sync because both
    # reference ADAMATON_NANO_RESEARCH_TAG.
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-nano-research:${ADAMATON_NANO_RESEARCH_TAG:-main}
    env_file: [.env, image-tags.env]
    entrypoint: ["/usr/local/bin/nano-research-worker"]
    environment:
      NANO_RESEARCH_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      QWEN_BASE_URL: ${QWEN_BASE_URL:-http://10.0.4.37:9080/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen3.6-27b-nvfp8}
      QWEN_MODEL_ID: ${QWEN_MODEL_ID:-qwen3.6-27b-nvfp8}
      SKILLS_RAE_URL: http://skills-rae:7376
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      NANO_RESEARCH_LOG_LEVEL: ${NANO_RESEARCH_LOG_LEVEL:-info}
      FIGURE_RENDERER_URL: http://figure-renderer:8090
      NANO_WORKER_LABEL: pi5
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - nano_workspace:/var/lib/nano-research
    restart: unless-stopped

  figure-renderer:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-nano-figure-renderer:${ADAMATON_FIGURE_RENDERER_TAG:-main}
    env_file: [.env, image-tags.env]
    expose:
      - "8090"
    restart: unless-stopped

  # ---- platform sub-repo --------------------------------------------------
  backend:
    init: true
    # Python R2R backend. Still built from the platform sub-repo until the
    # planned platform/backend → Go cutover lands.
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-platform-backend:${ADAMATON_BACKEND_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      R2R_CONFIG_PATH: /app/configs/platform.toml
      PLATFORM_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      REDIS_URL: redis://redis:6379
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      OCTEN_SIDECAR_URL: ${OCTEN_SIDECAR_URL:-http://10.0.4.37:8090}
      RESEARCH_USE_OCTEN_RETRIEVAL: "true"
      RESEARCH_RERANK_TIMEOUT: "30"
      LITELLM_LOG: ${LITELLM_LOG:-INFO}
      R2R_POSTGRES_MAX_CONNECTIONS: "40"
      SEARXNG_URL: http://searxng:8080
      R2R_INTERNAL_URL: http://r2g:7373
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "7272:7272"
    volumes:
      - dr_uploads:/var/lib/dr-uploads:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7272/platform/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 1800s
    restart: unless-stopped

  worker-lo:
    # Shares the adamaton-platform-backend image with the backend service
    # above; entrypoint differs. Tag stays in sync via ADAMATON_BACKEND_TAG.
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-platform-backend:${ADAMATON_BACKEND_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      R2R_CONFIG_PATH: /app/configs/platform.toml
      PLATFORM_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      REDIS_URL: redis://redis:6379
      BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://10.0.4.37:8089}
      OCTEN_SIDECAR_URL: ${OCTEN_SIDECAR_URL:-http://10.0.4.37:8090}
      R2R_INTERNAL_URL: http://r2g:7373
    extra_hosts:
      - "workstation:${WORKSTATION_IP:-10.0.4.37}"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - dr_uploads:/var/lib/dr-uploads:rw
    entrypoint:
      - bash
      - -c
      - exec python -m arq app.workers.lo_worker.WorkerSettings
    restart: unless-stopped

  plugin-host:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-plugin-host:${ADAMATON_PLUGIN_HOST_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      PH_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      PH_PORT: "7375"
      PH_MANIFEST_DIR: /etc/deepresearch/plugins
      PH_SOCKET_DIR: /run/dr-plugins
      PH_DR_UPLOADS_DIR: /var/lib/dr-uploads
      PH_LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "7375"
    volumes:
      - ./plugin-manifests:/etc/deepresearch/plugins:ro
      # Python plugin payloads (search/zotero/etc.) — bind-mounted into
      # the path plugin-host reads via PH_PLUGIN_PAYLOADS_DIR (default
      # /opt/dr-plugins). Operator drops a symlink at
      # ~/Adamaton-deploy/platform-plugins pointing at the source dir,
      # so plugin code can be swapped without rebuilding the image.
      - ./platform-plugins:/opt/dr-plugins:ro
      - dr_uploads:/var/lib/dr-uploads:rw
    restart: unless-stopped

  dispatch-worker:
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-dispatch-worker:${ADAMATON_DISPATCH_WORKER_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      EVO_POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

  evo-api:
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-evo-api:${ADAMATON_EVO_API_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      GITEA_BASE_URL: ${GITEA_BASE_URL:-http://localhost}
      TEMPORAL_ADDRESS: temporal:7233
      API_BIND_ADDRESS: 0.0.0.0
      API_TOKEN: ${EVO_API_TOKEN}
      PORT: "9123"
      DEEPRESEARCH_URL: http://backend:7272
      CCSAVER_DB: /data/ccsaver/data.db
      DASHBOARD_BASE_PATH: /evo-api
      # Workflow-node catalog is baked into the image at
      # /opt/evo/plugins/{builtin,community,n8n}. EVO_HOME makes the
      # apiserver's resolvePluginDirs() pick that canonical layout
      # directly. Operators wanting a host-mounted override can still
      # set EVO_PLUGIN_DIRS (colon-separated) here.
      EVO_HOME: /opt/evo
      # Per-host deploy-agent base URLs. Consumed by the /api/v1/nodes
      # endpoints to proxy "spin up another worker" requests from the
      # SPA to the right rack's agent. The dashboard injects
      # DEPLOY_AGENT_TOKEN server-side, so the SPA never sees it.
      # Compose-internal name for pi5 (same network); LAN-routable
      # addresses for the others.
      # IP-based (not mDNS) because the dashboard runs in the docker
      # network where Pi-internal .local names don't resolve. Override
      # in .env if the LAN topology shifts. pi5 reaches its own agent
      # via the compose service name.
      ADAMATON_DEPLOY_AGENTS: ${ADAMATON_DEPLOY_AGENTS:-pi5=http://deploy-agent:9128,pi5-speaker=http://10.0.4.20:9128,workstation=http://10.0.4.37:9128,blackwell=http://10.0.4.37:9128}
      DEPLOY_AGENT_TOKEN: ${DEPLOY_AGENT_TOKEN}
    volumes:
      - /srv/ccsaver:/data/ccsaver:ro
      - ${AGENT_MEMORY_DIR:-/home/sirus/agent-memory}/claude/CLAUDE.md:/root/.claude/CLAUDE.md:ro
      - ${AGENT_MEMORY_DIR:-/home/sirus/agent-memory}/claude/projects:/root/.claude/projects:ro
      - ${AGENT_MEMORY_DIR:-/home/sirus/agent-memory}/codex/memories:/root/.codex/memories:ro
      - ${AGENT_MEMORY_DIR:-/home/sirus/agent-memory}/gemini/GEMINI.md:/root/.gemini/GEMINI.md:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    expose:
      - "9123"
    restart: unless-stopped

  # ---- evolve sub-repo ----------------------------------------------------
  evo-worker:
    hostname: pi
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-evo-worker:${ADAMATON_EVO_WORKER_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      POSTGRES_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      EVO_TASK_QUEUE: evo
      DEEPRESEARCH_URL: http://backend:7272
      LOG_LEVEL: info
      # KernelBench evals dispatch to blackwell via ssh per
      # `evolve: dual-target kernel eval via RemoteHost ssh` (86e6208).
      # Leave empty on the Pi so the worker only handles the cheap activities;
      # the blackwell stack runs another evo-worker with this populated.
      EVO_KERNEL_REMOTE_HOST: ""
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

  # ---- frontend sub-repo + edge proxy -------------------------------------
  frontend:
    # Caddy reverse-proxies every API and serves the SPA. The frontend SPA
    # bundle is built on the workstation and rsynced to ./frontend-dist/
    # by up.sh; we bind-mount it read-only into the caddy container.
    image: caddy:2-alpine
    # env_file is required so the Caddyfile's {env.EVO_API_TOKEN}
    # placeholder substitutes correctly at boot. Without it the SPA hits
    # /evo-api/* with an empty Bearer header and evo-api 401s every
    # request ("5 data sources unreachable" UI symptom).
    env_file: [.env]
    volumes:
      - ./frontend-dist:/srv/frontend:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - evo-api
      - nano-research
      - r2g
      - skills-rae
      - plugin-host
      - deploy-agent
    restart: unless-stopped

  # ---- push-deploy receiver -----------------------------------------------
  deploy-agent:
    # Bumped via `bin/adam ship-self pi5` (ssh-based; the agent can't
    # restart itself without cutting the connection). All other services
    # bump via `bin/adam ship pi5 <service>` which talks to this agent.
    image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-deploy-agent:${ADAMATON_DEPLOY_AGENT_TAG:-main}
    env_file: [.env, image-tags.env]
    environment:
      DEPLOY_AGENT_HOST: pi5
      # MUST equal the host-side path. The agent shells out to docker
      # compose against the host docker daemon; relative paths in the
      # compose file (./postgres-pi.conf etc.) get resolved against
      # this cwd and then sent to the daemon as bind-mount sources.
      # If this is a container-only path like /workdir the daemon
      # creates empty ghost dirs on the host and bind-mounts those.
      DEPLOY_AGENT_COMPOSE_DIR: /home/sirus/Adamaton-deploy
      DEPLOY_AGENT_BIND: ":9128"
    working_dir: /home/sirus/Adamaton-deploy
    volumes:
      # Docker socket: agent shells out to `docker compose` against the
      # host daemon. Root-equivalent; bearer token is the boundary.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind-mount the deploy dir at the SAME path on both sides so
      # compose's relative-path resolution gives identical results
      # whether evaluated from the agent's view or the host daemon's.
      - /home/sirus/Adamaton-deploy:/home/sirus/Adamaton-deploy
    ports:
      # LAN-direct. bin/adam ship uses http://<host>:9128 instead of going
      # through Caddy/HTTPS -- pi5-speaker has no Caddy edge, and the
      # bearer token is the security boundary anyway. Firewall the
      # 10.0.4.x subnet at the gateway, not here.
      - "9128:9128"
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  dr_uploads:
  reranker_hf_cache:
  caddy_data:
  caddy_config:
  nano_workspace:
