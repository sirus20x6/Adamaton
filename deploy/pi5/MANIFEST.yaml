# Pi #1 (pi5) — main Adamaton stack image manifest.
#
# Single source of truth for what image_tag this host runs. Updated by:
#   bin/adam fleet promote <sha-or-tag>     # updates this + all peer MANIFESTs
#   (manual edit + commit)                  # for per-host canaries
#
# Consumed by:
#   bin/adam fleet pull pi5                 # ssh + IMAGE_TAG=<tag> docker compose pull + up -d
#   deploy/pi5/up.sh                        # exports IMAGE_TAG before docker compose
#
# Tag forms:
#   "main"           — always-latest from origin/main (auto-rolls on push)
#   "sha-abc1234"    — immutable, reproducible (preferred for production)
#   "v0.2.0"         — semver tag (cut by `gh release create v0.2.0` on a sub-repo)

host: pi5
image_tag: "main"

# Services that the deploy-agent will accept in /deploy/restart calls.
# Must match the service names in docker-compose.yml verbatim.
# Image refs in docker-compose.yml are: ${WORKSTATION_IP}:5000/adamaton-<image>:${ADAMATON_<NAME>_TAG}
services:
  - r2g
  - skills-rae
  - skills-rae-worker
  - adamaton-worker     # unified — replaces skills/reindex/dispatch/evo-worker
  - nano-research
  - nano-research-worker
  - figure-renderer
  - backend
  - worker-lo
  - plugin-host
  - evo-api
  - deploy-agent
  - dataset-worker      # evolve/dataset-manager — local + HF importers, S3/MinIO blob storage
  # Standalone worker services. Kept allow-listed for one release
  # cycle so `bin/adam deploy --rollback` to a pre-consolidation SHA
  # can still drive their restarts; remove after the rollback window
  # closes.
  - skills-worker
  - reindex-worker
  - dispatch-worker
  - evo-worker
