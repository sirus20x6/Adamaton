# Postgres tuning for Pi 5 4GB. Bind-mounted into the postgres container at
# /etc/postgresql/postgresql.conf -- ported from pi5:~/deepresearch/infra/postgres-pi.conf.
listen_addresses = '*'

# Memory: total 4GB box, leave ~2.5GB for everything else.
shared_buffers = 512MB
effective_cache_size = 1500MB
work_mem = 8MB
maintenance_work_mem = 64MB
wal_buffers = 16MB

# Parallelism: Pi 5 has 4 cores.
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# Misc
max_connections = 200
checkpoint_completion_target = 0.9
random_page_cost = 1.1            # NVMe-backed
effective_io_concurrency = 200
default_statistics_target = 100

# Logging -- quiet
log_min_duration_statement = 5000 # ms
log_statement = 'none'
