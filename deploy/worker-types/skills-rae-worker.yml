# Worker-types catalog entry — skills-rae-worker. See skills-worker.yml
# for the WORKER_* var conventions.
#
# Carries `extra_hosts` so BGE_SIDECAR_URL (which points at workstation:
# 8089) resolves wherever this worker lands. WORKSTATION_IP is the same
# across the fleet so the host alias is stable.

service:
  hostname: ${WORKER_HOSTNAME:-unknown}
  # Shares the adamaton-skills-rae image with the service of the same
  # name; entrypoint differentiates. Mirrors the nano-research-worker
  # / nano-research pattern.
  image: ${WORKSTATION_IP:-10.0.4.37}:5000/adamaton-skills-rae:${ADAMATON_SKILLS_RAE_TAG:-main}
  env_file: [.env, image-tags.env]
  entrypoint: ["/usr/local/bin/skills-rae-worker"]
  environment:
    SKILLS_RAE_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${WORKER_POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-postgres}?sslmode=disable
    BGE_SIDECAR_URL: ${BGE_SIDECAR_URL:-http://workstation:8089}
    SKILLS_RAE_EMBED_MODEL: bge-m3
    TEMPORAL_ADDRESS: ${WORKER_TEMPORAL_HOST:-temporal}:7233
    TEMPORAL_NAMESPACE: default
    SKILLS_RAE_LOG_LEVEL: info
  extra_hosts:
    - "workstation:${WORKSTATION_IP:-10.0.4.37}"
  restart: unless-stopped
