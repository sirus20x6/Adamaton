# /thearray/gogents/.github/workflows/ai_pr_review.yml
name: AI-Driven PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Default to least-privilege; individual jobs can elevate as needed.
permissions:
  contents: read

# Cancel in-progress runs when a newer commit lands on the same ref. Saves CI
# minutes on rapid pushes and prevents stale ai-review runs from racing newer
# ones to post comments.
concurrency:
  group: ai-review-${{ github.ref }}
  cancel-in-progress: true

# TODO(supply-chain): pin every action below to a 40-char commit SHA, not a
# tag. Tag re-points are a silent supply-chain attack vector — see the
# aquasecurity/trivy compromise (March 2026). Until that audit is done, the
# tags below give us a partial-trust posture; the SHAs were not verified at
# the time this comment was added because the network lookup wasn't trivially
# available from the editor environment.
#
# Suggested next pinning (verify each SHA with `gh api` before applying):
#   actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
#   actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed   # v5.1.0
#   actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57      # v4.2.0
#   golangci/golangci-lint-action@2226d7cb06a077cd73e56eedd38eecad18e5d837  # v6.5.0
#   docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf       # v3.2.0
#   docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db     # v3.6.1
#   docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75       # v6.9.0

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  ai-review:
    # Only run the heavy review pipeline on actual PR events.
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build worker and starter
        run: |
          mkdir -p bin
          go build -o bin/worker ./workers/
          go build -o bin/start_workflow ./cmd/start-workflow/

      - name: Start Temporal Server (Development)
        run: |
          # For development/testing - in production you'd use a real Temporal cluster
          docker run -d --name temporal-dev \
            -p 7233:7233 \
            -p 8088:8088 \
            temporalio/auto-setup:1.25.2

      - name: Wait for Temporal to be ready
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:7233 > /dev/null; do sleep 2; done'

      - name: Start worker in background
        run: |
          export GITHUB_TOKEN="${{ secrets.GITHUB_MCP_TOKEN }}"
          export VLLM_ENDPOINT="${{ vars.VLLM_ENDPOINT || 'http://vllm.local:8000/generate' }}"
          export MCP_SERVER_URL="${{ vars.MCP_SERVER_URL || 'http://localhost:3000' }}"
          export LOG_LEVEL="info"

          ./bin/worker > worker.log 2>&1 &
          echo $! > worker.pid

          # Poll worker.log until it reports being connected to Temporal
          # (the worker logs an "Started Temporal worker" / "registered" message
          # after it successfully attaches to the task queue).
          timeout 60s bash -c '
            until grep -qE "started.*[Ww]orker|registered.*workflow|worker started successfully" worker.log; do
              if ! kill -0 $(cat worker.pid) 2>/dev/null; then
                echo "Worker process exited before becoming ready" >&2
                cat worker.log >&2
                exit 1
              fi
              sleep 1
            done
          '

      - name: Trigger PR Review Workflow
        run: |
          export GITHUB_TOKEN="${{ secrets.GITHUB_MCP_TOKEN }}"
          export VLLM_ENDPOINT="${{ vars.VLLM_ENDPOINT || 'http://vllm.local:8000/generate' }}"
          export MCP_SERVER_URL="${{ vars.MCP_SERVER_URL || 'http://localhost:3000' }}"
          export WAIT_FOR_COMPLETION="true"

          ./bin/start_workflow \
            --pr ${{ github.event.pull_request.number }} \
            --owner ${{ github.repository_owner }} \
            --repo ${{ github.event.repository.name }}

      - name: Cleanup
        if: always()
        run: |
          # Stop worker if running
          if [ -f worker.pid ]; then
            kill $(cat worker.pid) || true
            rm worker.pid
          fi

          # Stop temporal container
          docker stop temporal-dev || true
          docker rm temporal-dev || true

  docker-build:
    # Multi-arch container build (linux/amd64, linux/arm64). Build-only on PRs;
    # publishing is intentionally out of scope for this workflow.
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
